  return colors[v - 1] || COLORS.textMuted;

// ── AI ─────────────────────────────────────────────────────────────────────────
async function fetchAIBreakdown(task) {
  const subtaskList = task.subtasks.length ? task.subtasks.map(s => `- ${s.title}${s.done ? " (done)" : ""}`).join("\n") : "None listed";
  const prompt = `You are a focused productivity assistant. A user has marked the following task as their most important thing to do today.

Task title: ${task.title}
Description: ${task.description || "No description provided"}
Priority: ${task.priority}
Due: ${task.due || "No due date"}
Existing subtasks:
${subtaskList}

Respond with ONLY the following three sections, using these exact labels on their own lines:

SUMMARY
Write 2-3 sentences explaining what this task involves and why it matters.

STEPS
1. First step
2. Second step
3. Third step
(4-8 numbered steps total, specific and actionable)

WATCH OUT
One sentence about the most likely thing that could derail this task.`;

  const response = await fetch("/.netlify/functions/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt }),
  });
  const raw = await response.text();
  let data;
  try { data = JSON.parse(raw); } catch(e) { throw new Error("Could not parse response"); }
  if (data.error) throw new Error(data.error.message || "API error");
  const text = data.text || "";
  if (!text) throw new Error("Empty response from API");
  return parseBreakdown(text);
}

function parseBreakdown(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(l => l.length > 0);
  let section = null, summary = [], steps = [], watchOut = [];
  for (const line of lines) {
    if (line.toUpperCase() === "SUMMARY") { section = "summary"; continue; }
    if (line.toUpperCase() === "STEPS") { section = "steps"; continue; }
    if (line.toUpperCase().startsWith("WATCH OUT")) { section = "watch"; continue; }
    if (section === "summary") summary.push(line);
    else if (section === "steps") { const clean = line.replace(/^\d+\.\s*/, "").trim(); if (clean) steps.push(clean); }
    else if (section === "watch") watchOut.push(line);
  }
  return { summary: summary.join(" "), steps, watchOut: watchOut.join(" ") };
}

// ── AI Breakdown Panel ─────────────────────────────────────────────────────────
function AIBreakdownPanel({ task, onSaveBreakdown }) {
  const [state, setState] = useState("idle");
  const [breakdown, setBreakdown] = useState(task.aiBreakdown || null);
  const [stepsDone, setStepsDone] = useState({});
  const [open, setOpen] = useState(!!task.aiBreakdown);

  async function generate() {
    setState("loading");
    setOpen(true);
    try {
      const result = await fetchAIBreakdown(task);
      setBreakdown(result);
      onSaveBreakdown(task.id, result);
      setState("done");
    } catch(e) { setState("error"); }
  }

  const hasBreakdown = breakdown && (breakdown.summary || breakdown.steps?.length);

  return (
    <div style={{ marginTop: 12, borderTop: `1px solid ${COLORS.border}`, paddingTop: 12 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={() => setOpen(o => !o)} style={{ display: "flex", alignItems: "center", gap: 6, background: "none", padding: "4px 0" }}>
          <span style={{ fontSize: 14 }}>✨</span>
          <span style={{ fontSize: 12, fontWeight: 700, color: COLORS.accent, letterSpacing: 0.3 }}>AI Breakdown</span>
          {hasBreakdown && <span style={{ fontSize: 10, color: COLORS.textMuted, marginLeft: 2 }}>{open ? "▲" : "▼"}</span>}
        </button>
        <button onClick={generate} disabled={state === "loading"} style={{ background: state === "loading" ? COLORS.surface3 : COLORS.frog, color: state === "loading" ? COLORS.textMuted : "#fff", borderRadius: 6, padding: "4px 12px", fontSize: 11, fontWeight: 600, opacity: state === "loading" ? 0.7 : 1 }}>
          {state === "loading" ? "Thinking..." : hasBreakdown ? "Regenerate" : "Break it down"}
        </button>
      </div>
      {!open && hasBreakdown && (
        <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 6, fontStyle: "italic" }}>
          {breakdown.steps?.length} steps · tap to expand
        </div>
      )}
      {open && <div style={{ marginTop: 10 }}>
      {state === "loading" && (
        <div className="ai-thinking" style={{ background: COLORS.surface, borderRadius: 8, padding: "12px 14px", fontSize: 13, color: COLORS.textMuted, border: `1px solid ${COLORS.border}`, display: "flex", alignItems: "center", gap: 6 }}>
          <span>●</span><span>●</span><span>●</span><span style={{ marginLeft: 4 }}>Analysing your task...</span>
        </div>
      )}
      {state === "error" && <div style={{ background: COLORS.highDim, borderRadius: 8, padding: "10px 14px", fontSize: 12, color: COLORS.high }}>Something went wrong. Try again.</div>}
      {hasBreakdown && state !== "loading" && (
        <div className="ai-fade-in" style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {breakdown.summary && (
            <div style={{ background: COLORS.surface, borderRadius: 8, padding: "12px 14px", border: `1px solid ${COLORS.border}`, fontSize: 13, lineHeight: 1.6 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: COLORS.textMuted, letterSpacing: 0.8, marginBottom: 6, textTransform: "uppercase" }}>What this involves</div>
              {breakdown.summary}
            </div>
          )}
          {breakdown.steps?.length > 0 && (
            <div style={{ background: COLORS.surface, borderRadius: 8, padding: "12px 14px", border: `1px solid ${COLORS.border}` }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: COLORS.textMuted, letterSpacing: 0.8, marginBottom: 8, textTransform: "uppercase" }}>
                Action plan — {breakdown.steps.filter((_,i) => stepsDone[i]).length}/{breakdown.steps.length} done
              </div>
              <div style={{ height: 3, background: COLORS.surface3, borderRadius: 2, overflow: "hidden", marginBottom: 10 }}>
                <div style={{ height: "100%", borderRadius: 2, background: COLORS.frog, width: `${breakdown.steps.length ? (breakdown.steps.filter((_,i) => stepsDone[i]).length / breakdown.steps.length) * 100 : 0}%`, transition: "width 0.3s" }} />
              </div>
              {breakdown.steps.map((step, i) => (
                <div key={i} onClick={() => setStepsDone(p => ({ ...p, [i]: !p[i] }))} style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "7px 0", borderBottom: i < breakdown.steps.length - 1 ? `1px solid ${COLORS.surface3}` : "none", cursor: "pointer" }}>
                  <div style={{ width: 20, height: 20, borderRadius: "50%", flexShrink: 0, border: `2px solid ${stepsDone[i] ? COLORS.frog : COLORS.border}`, background: stepsDone[i] ? COLORS.frog : "transparent", display: "flex", alignItems: "center", justifyContent: "center", marginTop: 1, transition: "all 0.15s" }}>
                    {stepsDone[i] && <span style={{ color: "#fff", fontSize: 10, fontWeight: 700 }}>✓</span>}
                  </div>
                  <span style={{ fontSize: 13, color: stepsDone[i] ? COLORS.textMuted : COLORS.text, textDecoration: stepsDone[i] ? "line-through" : "none", lineHeight: 1.5, flex: 1 }}>
                    <strong style={{ color: stepsDone[i] ? COLORS.textMuted : COLORS.frogDark, marginRight: 4 }}>{i+1}.</strong>{step}

            <div style={{ background: COLORS.mediumDim, borderRadius: 8, padding: "10px 14px", border: "1px solid #fcd34d", fontSize: 12, color: "#92400e", display: "flex", gap: 8, lineHeight: 1.5 }}>

              <div><div style={{ fontWeight: 700, marginBottom: 2 }}>Watch out</div>{breakdown.watchOut}</div>
            </div>
          )}
        </div>
      )}
      </div>}
    </div>
  );
}

          border: todayEntry ? `1px solid ${COLORS.frogBorder}` : "none"
        }}>
          {todayEntry ? "✓ Checked in today" : "Check in now"}
        </button>
      </div>

      {/* Today's snapshot */}
      {todayEntry ? (
        <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 20, marginBottom: 16, boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 14 }}>Today's Check-in</div>
          <div className="wellbeing-metrics">
            {metrics.map(([key, cfg]) => (
              <div key={key} style={{ textAlign: "center" }}>
                <div style={{ fontSize: 22, marginBottom: 4 }}>{MOOD_EMOJIS[todayEntry[key] - 1]}</div>
                <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 2 }}>{cfg.label}</div>
                <div style={{ fontSize: 16, fontWeight: 700, color: moodColor(todayEntry[key]) }}>{todayEntry[key]}/5</div>
              </div>
            ))}
          </div>
          {todayEntry.note && (
            <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${COLORS.border}`, fontSize: 13, color: COLORS.textDim, fontStyle: "italic" }}>
              "{todayEntry.note}"
            </div>
          )}
        </div>
      ) : (
        <div style={{ background: COLORS.accentDim, border: `1px solid ${COLORS.accent}30`, borderRadius: 12, padding: 16, marginBottom: 16, textAlign: "center" }}>
          <div style={{ fontSize: 13, color: COLORS.accent, fontWeight: 500 }}>No check-in yet today — how are you feeling?</div>
        </div>
      )}

      {/* Week comparison */}
      <div className="stats-grid-3">
        <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 16, boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
          <div style={{ fontSize: 11, color: COLORS.textMuted, fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 8 }}>Avg Mood This Week</div>
          <div style={{ fontSize: 26, fontWeight: 700, color: thisWeek.length ? moodColor(Math.round(avg(thisWeek, "mood"))) : COLORS.textMuted }}>{avg(thisWeek, "mood") || "—"}</div>
          {lastWeek.length > 0 && <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 4 }}>vs {avg(lastWeek, "mood")} last week</div>}
        </div>
        <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 16, boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
          <div style={{ fontSize: 11, color: COLORS.textMuted, fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 8 }}>Avg Energy This Week</div>
          <div style={{ fontSize: 26, fontWeight: 700, color: thisWeek.length ? moodColor(Math.round(avg(thisWeek, "energy"))) : COLORS.textMuted }}>{avg(thisWeek, "energy") || "—"}</div>
          {lastWeek.length > 0 && <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 4 }}>vs {avg(lastWeek, "energy")} last week</div>}
        </div>
        <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 16, boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
          <div style={{ fontSize: 11, color: COLORS.textMuted, fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 8 }}>Task Happiness</div>
          <div style={{ fontSize: 26, fontWeight: 700, color: avgHappiness ? moodColor(Math.round(avgHappiness)) : COLORS.textMuted }}>
            {avgHappiness ? `${avgHappiness}★` : "—"}
          </div>
          <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 4 }}>{completedWithRating.length} tasks rated</div>
        </div>
      </div>

      {/* 14-day chart */}
      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 20, marginBottom: 16, boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 16 }}>Mood & Energy — Last 14 Days</div>
        <div style={{ display: "flex", gap: 12, marginBottom: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: COLORS.textMuted }}><div style={{ width: 12, height: 3, background: "#8b5cf6", borderRadius: 2 }} />Mood</div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: COLORS.textMuted }}><div style={{ width: 12, height: 3, background: "#10b981", borderRadius: 2 }} />Energy</div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: COLORS.textMuted }}><div style={{ width: 12, height: 3, background: "#f59e0b", borderRadius: 2 }} />Happiness</div>
        </div>
        <svg viewBox={`0 0 ${svgW} 100`} style={{ width: "100%" }}>
          {[1,2,3,4,5].map(v => (
            <line key={v} x1={0} y1={90 - (v-1)*18} x2={svgW} y2={90 - (v-1)*18}
              stroke={COLORS.border} strokeWidth={0.5} strokeDasharray="4,4" />
          ))}
          {["mood","energy","happiness"].map((key, ki) => {
            const lineColor = ["#8b5cf6","#10b981","#f59e0b"][ki];
            const pts = last14.map((d, i) => {
              const x = (i / 13) * (svgW - 20) + 10;
              const y = d.entry ? 90 - (d.entry[key] - 1) * 18 : null;
              return { x, y, hasData: !!d.entry };
            });
            const pathPts = pts.filter(p => p.y !== null);
            if (pathPts.length < 2) return null;
            const pathD = pathPts.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x} ${p.y}`).join(" ");
            return (
              <g key={key}>
                <path d={pathD} fill="none" stroke={lineColor} strokeWidth={2} strokeLinejoin="round" />
                {pathPts.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r={3} fill={lineColor} />)}
              </g>
            );
          })}
          {last14.map((d, i) => {
            const x = (i / 13) * (svgW - 20) + 10;
            const isToday = d.date === today();
            return (
              <text key={d.date} x={x} y={100} textAnchor="middle" fontSize={9}
                fill={isToday ? COLORS.accent : COLORS.textMuted} fontWeight={isToday ? 700 : 400}>
                {new Date(d.date + "T00:00:00").toLocaleDateString("en-GB", { weekday: "short" }).slice(0,2)}
              </text>
            );
          })}
        </svg>
      </div>

      {/* Stress & Sleep */}
      <div className="stats-grid-2">
        {["stress","sleep"].map(key => {
          const cfg = METRIC_CONFIG[key];
          const vals = last14.filter(d => d.entry).map(d => d.entry[key]);
          const avgVal = vals.length ? (vals.reduce((a,b) => a+b,0)/vals.length).toFixed(1) : null;
          return (
            <div key={key} style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 16, boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: COLORS.textMuted, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 10 }}>{cfg.emoji} {cfg.label} (14-day avg)</div>
              <div style={{ fontSize: 28, fontWeight: 700, color: avgVal ? cfg.color : COLORS.textMuted }}>{avgVal || "—"}<span style={{ fontSize: 14, fontWeight: 400, color: COLORS.textMuted }}>/5</span></div>
              <div style={{ display: "flex", gap: 4, marginTop: 10 }}>
                {last14.map((d, i) => (
                  <div key={i} style={{ flex: 1, height: 24, borderRadius: 3, background: d.entry ? moodColor(d.entry[key]) : COLORS.surface3, opacity: d.entry ? 1 : 0.3 }} title={d.date} />
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* Recent task happiness */}
      {completedWithRating.length > 0 && (
        <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 20, boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 14 }}>Task Happiness Ratings</div>
          {completedWithRating.slice(-8).reverse().map(t => (
            <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: `1px solid ${COLORS.border}` }}>
              <div style={{ flex: 1, fontSize: 13, fontWeight: 500, color: COLORS.text }}>{t.title}</div>
              <div style={{ display: "flex", gap: 2 }}>
                {[1,2,3,4,5].map(s => <span key={s} style={{ fontSize: 14, opacity: s <= t.happiness ? 1 : 0.2 }}>⭐</span>)}
              </div>
            </div>
          ))}
        </div>
      )}

      {checkins.length === 0 && (
        <div style={{ textAlign: "center", padding: 40, color: COLORS.textMuted, fontSize: 14 }}>
          No check-ins yet. Click "Check in now" to start tracking your wellbeing.
        </div>
      )}

      <div style={{ marginTop: 24 }}>
        <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 16 }}>Patterns & Correlations</h3>
        <CorrelationAnalysis tasks={tasks} checkins={checkins} />
      </div>
    </div>
  );
}

// ── Badge ──────────────────────────────────────────────────────────────────────
function Badge({ priority }) {
  const cfg = PRIORITY_CONFIG[priority];
  return <span style={{ background: cfg.dim, color: cfg.color, fontSize: 10, fontWeight: 700, letterSpacing: 0.8, padding: "3px 8px", borderRadius: 4 }}>{cfg.label}</span>;
}

function ProgressBar({ subtasks }) {
  if (!subtasks.length) return null;
  const pct = Math.round((subtasks.filter(s => s.done).length / subtasks.length) * 100);
  return (
    <div style={{ marginTop: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: COLORS.textMuted, marginBottom: 4 }}>
        <span>{subtasks.filter(s => s.done).length}/{subtasks.length} subtasks</span>
        <span>{pct}%</span>
      </div>
      <div style={{ height: 4, background: COLORS.surface3, borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${pct}%`, borderRadius: 2, background: pct === 100 ? COLORS.frog : COLORS.accent, transition: "width 0.4s ease" }} />
      </div>
    </div>
  );
}

// ── TaskCard ───────────────────────────────────────────────────────────────────
function TaskCard({ task, onEdit, onDelete, onFrog, onStatusChange, onDragStart, onDragOver, onDrop, isDragging, onSaveBreakdown, projects }) {
  const isOverdue = task.due && task.due < today() && task.status !== "Done";
  const isDueToday = task.due === today();
  const project = projects?.find(p => p.id === task.projectId);
  return (
    <div draggable onDragStart={onDragStart} onDragOver={onDragOver} onDrop={onDrop}
      style={{ background: task.isFrog ? COLORS.frogDim : COLORS.surface, border: `1px solid ${task.isFrog ? COLORS.frogBorder : COLORS.border}`, borderRadius: 10, padding: 14, marginBottom: 8, cursor: "grab", opacity: isDragging ? 0.4 : 1, transition: "all 0.15s", position: "relative", overflow: "hidden", boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }}>
      {task.isFrog && <div style={{ position: "absolute", top: 0, right: 0, background: COLORS.frog, color: "#fff", fontSize: 10, fontWeight: 700, padding: "3px 10px", borderBottomLeftRadius: 8 }}>🐸 FROG</div>}
      <div style={{ display: "flex", alignItems: "flex-start", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>
        <Badge priority={task.priority} />
        {project && <span style={{ fontSize: 10, fontWeight: 700, padding: "3px 8px", borderRadius: 4, background: getProjectColor(project.colorId).bg, color: getProjectColor(project.colorId).text, border: `1px solid ${getProjectColor(project.colorId).border}` }}>{project.name}</span>}
        {task.due && <span style={{ fontSize: 10, color: isOverdue ? COLORS.high : isDueToday ? COLORS.medium : COLORS.textMuted, padding: "3px 8px", background: isOverdue ? COLORS.highDim : isDueToday ? COLORS.mediumDim : COLORS.surface3, borderRadius: 4, fontWeight: 500 }}>{isOverdue ? "⚠ " : isDueToday ? "📅 " : ""}{task.due}</span>}
        {task.happiness && <span style={{ fontSize: 10, padding: "3px 8px", background: COLORS.surface3, borderRadius: 4 }}>{"⭐".repeat(task.happiness)}</span>}
      </div>
      <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 4, lineHeight: 1.4, paddingRight: task.isFrog ? 56 : 0 }}>{task.title}</div>
      {task.description && <div style={{ fontSize: 13, color: COLORS.textDim, lineHeight: 1.5, marginBottom: 8 }}>{task.description.slice(0, 120)}{task.description.length > 120 ? "…" : ""}</div>}
      <ProgressBar subtasks={task.subtasks} />
      <div style={{ display: "flex", gap: 5, marginTop: 12, alignItems: "center" }}>
        <button onClick={() => onEdit(task)} style={{ background: COLORS.accentDim, color: COLORS.accent, borderRadius: 6, padding: "5px 10px", fontSize: 12, fontWeight: 600 }}>Edit</button>
        <button onClick={() => onFrog(task.id)} style={{ background: task.isFrog ? COLORS.frogDim : COLORS.surface3, color: task.isFrog ? COLORS.frog : COLORS.textMuted, borderRadius: 6, padding: "5px 10px", fontSize: 12, fontWeight: 600, border: `1px solid ${task.isFrog ? COLORS.frogBorder : COLORS.border}` }}>{task.isFrog ? "🐸 Unfrog" : "🐸"}</button>
        <select value={task.status} onChange={e => onStatusChange(task.id, e.target.value)} style={{ flex: 1, fontSize: 12, padding: "5px 8px" }}>
          {STATUS_COLS.map(s => <option key={s}>{s}</option>)}
        </select>
        <button onClick={() => onDelete(task.id)} style={{ background: COLORS.highDim, color: COLORS.high, borderRadius: 6, padding: "5px 8px", fontSize: 12 }}>✕</button>
      </div>
      <AIBreakdownPanel task={task} onSaveBreakdown={onSaveBreakdown} />
    </div>
  );
}

// ── TaskModal ──────────────────────────────────────────────────────────────────
function TaskModal({ task, onSave, onClose, projects }) {
  const [form, setForm] = useState(task || { title: "", description: "", priority: "Medium", status: "To Do", due: "", subtasks: [], isFrog: false, createdAt: new Date().toISOString(), completedAt: null, aiBreakdown: null, happiness: null, projectId: null, timeSpent: 0, estimatedMins: "" });
  const [newSub, setNewSub] = useState("");
  const [dueSuggesting, setDueSuggesting] = useState(false);
  const [dueSuggestion, setDueSuggestion] = useState(null);

  function setF(k, v) { setForm(f => ({ ...f, [k]: v })); }
  function addSub() { if (!newSub.trim()) return; setF("subtasks", [...form.subtasks, { id: generateId(), title: newSub.trim(), done: false }]); setNewSub(""); }
  function handleSave() {
    if (!form.title.trim()) return;
    const wasNotDone = task?.status !== "Done";
    const nowDone = form.status === "Done";
    onSave({ ...form, id: form.id || generateId(), completedAt: (wasNotDone && nowDone) ? new Date().toISOString() : form.completedAt });
  }

  async function handleSuggestDue() {
    if (!form.title.trim()) return;
    setDueSuggesting(true);
    setDueSuggestion(null);
    const result = await suggestDueDate(form.title, form.description, form.priority);
    setDueSuggesting(false);
    if (result) setDueSuggestion(result);
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: COLORS.surface, borderRadius: 14, width: "100%", maxWidth: 560, maxHeight: "90vh", overflow: "auto", padding: 28, boxShadow: "0 20px 60px rgba(0,0,0,0.15)", border: `1px solid ${COLORS.border}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
          <h2 style={{ fontSize: 18, fontWeight: 700 }}>{task ? "Edit Task" : "New Task"}</h2>
          <button onClick={onClose} style={{ background: COLORS.surface3, color: COLORS.textDim, borderRadius: 8, padding: "6px 12px", fontSize: 13, border: `1px solid ${COLORS.border}` }}>✕ Close</button>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div><label style={{ fontSize: 12, color: COLORS.textMuted, fontWeight: 600, display: "block", marginBottom: 6 }}>TITLE *</label><input value={form.title} onChange={e => setF("title", e.target.value)} placeholder="What needs to be done?" /></div>
          <div><label style={{ fontSize: 12, color: COLORS.textMuted, fontWeight: 600, display: "block", marginBottom: 6 }}>DESCRIPTION</label><textarea value={form.description} onChange={e => setF("description", e.target.value)} placeholder="Add context or notes…" /></div>
          <div style={{ display: "flex", gap: 12, marginBottom: 0 }}>
            <div style={{ flex: 1 }}>
              <label style={{ fontSize: 12, color: COLORS.textMuted, fontWeight: 600, display: "block", marginBottom: 6 }}>PROJECT</label>
              <select value={form.projectId || ""} onChange={e => setF("projectId", e.target.value || null)}>
                <option value="">No project</option>
                {(projects || []).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </div>
            <div style={{ flex: 1 }}>
              <label style={{ fontSize: 12, color: COLORS.textMuted, fontWeight: 600, display: "block", marginBottom: 6 }}>EST. TIME (mins)</label>
              <input type="number" min={1} value={form.estimatedMins} onChange={e => setF("estimatedMins", e.target.value ? Number(e.target.value) : "")} placeholder="e.g. 60" />
            </div>
          </div>
          <div className="form-grid-3">
            <div><label style={{ fontSize: 12, color: COLORS.textMuted, fontWeight: 600, display: "block", marginBottom: 6 }}>PRIORITY</label><select value={form.priority} onChange={e => setF("priority", e.target.value)}>{Object.keys(PRIORITY_CONFIG).map(p => <option key={p}>{p}</option>)}</select></div>
            <div><label style={{ fontSize: 12, color: COLORS.textMuted, fontWeight: 600, display: "block", marginBottom: 6 }}>STATUS</label><select value={form.status} onChange={e => setF("status", e.target.value)}>{STATUS_COLS.map(s => <option key={s}>{s}</option>)}</select></div>
            <div>
              <label style={{ fontSize: 12, color: COLORS.textMuted, fontWeight: 600, display: "block", marginBottom: 6 }}>DUE DATE</label>
              <div style={{ display: "flex", gap: 6 }}>
                <input type="date" value={form.due} onChange={e => setF("due", e.target.value)} style={{ flex: 1 }} />
                <button onClick={handleSuggestDue} disabled={dueSuggesting || !form.title.trim()} title="AI suggest due date"
                  style={{ background: COLORS.accentDim, color: COLORS.accent, borderRadius: 7, padding: "0 10px", fontSize: 14, flexShrink: 0, opacity: !form.title.trim() ? 0.4 : 1, border: `1px solid ${COLORS.accent}30` }}>
                  {dueSuggesting ? "…" : "✨"}
                </button>
              </div>
              {dueSuggestion && (
                <div style={{ marginTop: 6, background: COLORS.accentDim, borderRadius: 8, padding: "8px 10px", border: `1px solid ${COLORS.accent}30` }}>
                  <div style={{ fontSize: 11, color: COLORS.accent, fontWeight: 600, marginBottom: 3 }}>AI suggests: {dueSuggestion.date}</div>
                  <div style={{ fontSize: 11, color: COLORS.textDim, marginBottom: 6 }}>{dueSuggestion.reason}</div>
                  <button onClick={() => { setF("due", dueSuggestion.date); setDueSuggestion(null); }}
                    style={{ background: COLORS.accent, color: "#fff", borderRadius: 5, padding: "4px 10px", fontSize: 11, fontWeight: 600 }}>Use this date</button>
                </div>
              )}
            </div>
          </div>
          <div>
            <label style={{ fontSize: 12, color: COLORS.textMuted, fontWeight: 600, display: "block", marginBottom: 10 }}>SUBTASKS</label>
            <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
              <input value={newSub} onChange={e => setNewSub(e.target.value)} onKeyDown={e => e.key === "Enter" && addSub()} placeholder="Add a subtask and press Enter…" />
              <button onClick={addSub} style={{ background: COLORS.accentDim, color: COLORS.accent, borderRadius: 8, padding: "10px 16px", fontWeight: 700, fontSize: 14, flexShrink: 0 }}>+</button>
            </div>
            {form.subtasks.map(s => (
              <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: COLORS.surface3, borderRadius: 8, marginBottom: 6, border: `1px solid ${COLORS.border}` }}>
                <input type="checkbox" checked={s.done} onChange={() => setF("subtasks", form.subtasks.map(x => x.id === s.id ? { ...x, done: !x.done } : x))} style={{ width: 16, height: 16, accentColor: COLORS.accent }} />
                <span style={{ flex: 1, fontSize: 14, color: s.done ? COLORS.textMuted : COLORS.text, textDecoration: s.done ? "line-through" : "none" }}>{s.title}</span>
                <button onClick={() => setF("subtasks", form.subtasks.filter(x => x.id !== s.id))} style={{ background: "none", color: COLORS.textMuted, fontSize: 16 }}>✕</button>
              </div>
            ))}
          </div>
          <button onClick={handleSave} style={{ background: COLORS.accent, color: "#fff", borderRadius: 8, padding: "13px", fontSize: 14, fontWeight: 600, marginTop: 4 }}>
            {task ? "Save Changes" : "Create Task"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── DailySummaryModal ──────────────────────────────────────────────────────────
function DailySummaryModal({ tasks, checkins, onClose, onOpenCheckin }) {
  const todayStr = today();
  const frog = tasks.find(t => t.isFrog);
  const dueToday = tasks.filter(t => t.due === todayStr && t.status !== "Done");
  const completedToday = tasks.filter(t => t.completedAt && t.completedAt.startsWith(todayStr));
  const activeTasks = tasks.filter(t => t.status !== "Done" && t.subtasks.length > 0);
  const todayCheckin = checkins.find(c => c.date === todayStr);

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: COLORS.surface, borderRadius: 14, width: "100%", maxWidth: 520, maxHeight: "90vh", overflow: "auto", padding: 28, boxShadow: "0 20px 60px rgba(0,0,0,0.15)", border: `1px solid ${COLORS.border}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
          <div>
            <h2 style={{ fontSize: 20, fontWeight: 700 }}>Daily Briefing</h2>
            <p style={{ color: COLORS.textMuted, fontSize: 13, marginTop: 2 }}>{new Date().toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" })}</p>
          </div>
          <button onClick={onClose} style={{ background: COLORS.surface3, color: COLORS.textDim, borderRadius: 8, padding: "6px 12px", border: `1px solid ${COLORS.border}` }}>✕</button>
        </div>
        <div style={{ marginTop: 24 }}>

          {/* Wellbeing snapshot */}
          <SummarySection title="💆 Today's Wellbeing">
            {todayCheckin ? (

// ── Weekly Summary ─────────────────────────────────────────────────────────────
function WeeklySummary({ tasks }) {
  const [copied, setCopied] = useState(false);
  const [weekOffset, setWeekOffset] = useState(0); // 0 = last week, -1 = two weeks ago etc

  // Calculate the Monday-Sunday of the target week
  function getWeekRange(offset) {
    const now = new Date();
    const dayOfWeek = now.getDay(); // 0=Sun, 1=Mon...
    const monday = new Date(now);
    monday.setDate(now.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1) + (offset * 7));
    monday.setHours(0,0,0,0);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    sunday.setHours(23,59,59,999);
    return { monday, sunday };
  }

  const { monday, sunday } = getWeekRange(weekOffset === 0 ? -1 : weekOffset);
  const mondayStr = monday.toISOString().split("T")[0];
  const sundayStr = sunday.toISOString().split("T")[0];

  const weekLabel = weekOffset === -1
    ? "Last Week"
    : weekOffset === -2
    ? "Two Weeks Ago"
    : monday.toLocaleDateString("en-GB", { day: "numeric", month: "short" }) + " – " + sunday.toLocaleDateString("en-GB", { day: "numeric", month: "short" });

  const completed = tasks.filter(t =>
    t.completedAt &&
    t.completedAt.split("T")[0] >= mondayStr &&
    t.completedAt.split("T")[0] <= sundayStr
  );

  const inProgress = tasks.filter(t => t.status === "In Progress");
  const overdue = tasks.filter(t => t.due && t.due < new Date().toISOString().split("T")[0] && t.status !== "Done");
  const frogsCompleted = completed.filter(t => t.isFrog);

  function formatDate(iso) {
    return new Date(iso + "T00:00:00").toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" });
  }

  function buildBulletList() {
    const lines = [];
    const weekRange = `${monday.toLocaleDateString("en-GB", { day: "numeric", month: "long" })} – ${sunday.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" })}`;
    lines.push(`Weekly Summary — ${weekRange}`);
    lines.push("");

    if (completed.length === 0) {
      lines.push("Completed Tasks: None recorded this week.");
    } else {
      lines.push(`Completed Tasks (${completed.length}):`);
      completed.forEach(t => {
        const dateStr = t.completedAt ? formatDate(t.completedAt.split("T")[0]) : "";
        const rating = t.happiness ? ` (rated ${t.happiness}/5)` : "";
        const priority = t.priority === "High" ? " [HIGH]" : "";
        lines.push(`  • ${t.title}${priority}${rating} — completed ${dateStr}`);
        if (t.subtasks.length > 0) {
          const done = t.subtasks.filter(s => s.done).length;
          lines.push(`    └ ${done}/${t.subtasks.length} subtasks completed`);
        }
      });
    }

    lines.push("");

    if (inProgress.length > 0) {
      lines.push(`In Progress (${inProgress.length}):`);
      inProgress.forEach(t => {
        const due = t.due ? ` (due ${formatDate(t.due)})` : "";
        lines.push(`  • ${t.title}${due}`);
      });
      lines.push("");
    }

    if (overdue.length > 0) {
      lines.push(`Overdue / Needs Attention (${overdue.length}):`);
      overdue.forEach(t => {
        lines.push(`  • ${t.title} — was due ${formatDate(t.due)}`);
      });
      lines.push("");
    }

    const upcoming = tasks.filter(t => {
      const nextMonday = new Date(monday);
      nextMonday.setDate(monday.getDate() + 7);
      const nextSunday = new Date(nextMonday);
      nextSunday.setDate(nextMonday.getDate() + 6);
      return t.due && t.due >= nextMonday.toISOString().split("T")[0] && t.due <= nextSunday.toISOString().split("T")[0] && t.status !== "Done";
    });

    if (upcoming.length > 0) {
      lines.push(`Due Next Week (${upcoming.length}):`);
      upcoming.forEach(t => {
        lines.push(`  • ${t.title} — due ${formatDate(t.due)}`);
      });
      lines.push("");
    }

    lines.push(`Stats: ${completed.length} tasks completed, ${frogsCompleted.length} priority frog${frogsCompleted.length !== 1 ? "s" : ""} tackled, ${overdue.length} overdue.`);
    return lines.join("
");
  }

  function copyToClipboard() {
    navigator.clipboard.writeText(buildBulletList()).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    });
  }

  const bulletText = buildBulletList();

  return (
    <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 20, marginBottom: 20, boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16, flexWrap: "wrap", gap: 8 }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 700 }}>📋 Weekly Summary</div>
          <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 2 }}>Ready to paste into your Monday report</div>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <button onClick={() => setWeekOffset(w => w - 1)} style={{ background: COLORS.surface3, color: COLORS.text, borderRadius: 6, padding: "5px 10px", fontSize: 12, border: `1px solid ${COLORS.border}` }}>←</button>
          <span style={{ fontSize: 12, fontWeight: 600, color: COLORS.text, minWidth: 100, textAlign: "center" }}>{weekLabel}</span>
          <button onClick={() => setWeekOffset(w => Math.min(w + 1, -1))} disabled={weekOffset >= -1} style={{ background: COLORS.surface3, color: weekOffset >= -1 ? COLORS.textMuted : COLORS.text, borderRadius: 6, padding: "5px 10px", fontSize: 12, border: `1px solid ${COLORS.border}`, opacity: weekOffset >= -1 ? 0.4 : 1 }}>→</button>
          <button onClick={copyToClipboard} style={{ background: copied ? COLORS.frogDim : COLORS.accentDim, color: copied ? COLORS.frog : COLORS.accent, borderRadius: 7, padding: "6px 14px", fontSize: 12, fontWeight: 700, border: `1px solid ${copied ? COLORS.frogBorder : COLORS.accent+"30"}`, transition: "all 0.2s" }}>
            {copied ? "✓ Copied!" : "Copy"}
          </button>
        </div>
      </div>

      <pre style={{ background: COLORS.surface2, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 14, fontSize: 12, color: COLORS.text, lineHeight: 1.8, fontFamily: "'DM Sans', system-ui, sans-serif", whiteSpace: "pre-wrap", wordBreak: "break-word", maxHeight: 360, overflow: "auto" }}>
        {bulletText}
      </pre>

      <div style={{ marginTop: 10, fontSize: 11, color: COLORS.textMuted }}>
        {completed.length} completed · {inProgress.length} in progress · {overdue.length} overdue this week
      </div>
    </div>
  );
}

  const maxBar = Math.max(...completedLast7.map(d => d.count), 1);

  const frogsCompleted = tasks.filter(t => t.isFrog && t.status === "Done").length;

        <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 16 }}>Completions — Last 7 Days</div>
        <svg viewBox={`0 0 ${svgW} ${svgH+24}`} style={{ width: "100%", maxWidth: svgW }}>

          {completedLast30.map((c,i) => { if(!c) return null; const x=(i/29)*(svgW-8)+4; const y=70-(c/max30)*60; return <circle key={i} cx={x} cy={y} r={3} fill={COLORS.accent} />; })}

// ── ImportExportModal ──────────────────────────────────────────────────────────
function ImportExportModal({ tasks, onImport, onClose }) {
  const [mode, setMode] = useState("export");
  const [error, setError] = useState("");
  const fileRef = useRef();
  function handleExport() {
    const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `tasks-${today()}.json`; a.click();
    URL.revokeObjectURL(url);
  }
  function handleImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error("Root must be an array of tasks");
        if (!data.every(t => t.id && t.title && t.status && t.priority)) throw new Error("Some tasks are missing required fields");
        onImport(data); onClose();
      } catch(err) { setError(err.message); }
    };
    reader.readAsText(file);
  }
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: COLORS.surface, borderRadius: 14, width: "100%", maxWidth: 520, padding: 28, boxShadow: "0 20px 60px rgba(0,0,0,0.15)", border: `1px solid ${COLORS.border}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <h2 style={{ fontSize: 18, fontWeight: 700 }}>Import / Export</h2>
          <button onClick={onClose} style={{ background: COLORS.surface3, color: COLORS.textDim, borderRadius: 8, padding: "6px 12px", border: `1px solid ${COLORS.border}` }}>✕</button>
        </div>
        <div style={{ display: "flex", gap: 6, marginBottom: 24 }}>
          {["export","import"].map(m => <button key={m} onClick={() => setMode(m)} style={{ background: mode===m ? COLORS.accentDim : COLORS.surface3, color: mode===m ? COLORS.accent : COLORS.textMuted, borderRadius: 8, padding: "7px 16px", fontSize: 13, fontWeight: 600, textTransform: "capitalize", border: `1px solid ${mode===m ? COLORS.accent+"40" : COLORS.border}` }}>{m}</button>)}
        </div>
        {mode === "export" && <div><p style={{ color: COLORS.textDim, fontSize: 14, marginBottom: 20 }}>Download all {tasks.length} tasks as a JSON file.</p><button onClick={handleExport} style={{ width: "100%", background: COLORS.accent, color: "#fff", borderRadius: 8, padding: "13px", fontSize: 14, fontWeight: 600 }}>Download tasks.json</button></div>}
        {mode === "import" && <div><p style={{ color: COLORS.textDim, fontSize: 14, marginBottom: 16 }}>Upload a JSON file. This will <strong style={{ color: COLORS.medium }}>replace</strong> all current tasks.</p>{error && <div style={{ background: COLORS.highDim, color: COLORS.high, borderRadius: 8, padding: 12, marginBottom: 16, fontSize: 13 }}>⚠ {error}</div>}<input type="file" accept=".json" ref={fileRef} onChange={handleImport} style={{ display: "none" }} /><button onClick={() => fileRef.current.click()} style={{ width: "100%", background: COLORS.surface2, color: COLORS.text, border: `2px dashed ${COLORS.border}`, borderRadius: 10, padding: "20px", fontSize: 14, fontWeight: 500 }}>Choose JSON file</button></div>}
      </div>
    </div>
  );
}



// ── Confetti ───────────────────────────────────────────────────────────────────
function Confetti({ onDone }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const pieces = Array.from({ length: 120 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      w: Math.random() * 10 + 6,
      h: Math.random() * 6 + 4,
      color: ["#4f46e5","#16a34a","#f59e0b","#ef4444","#3b82f6","#ec4899","#22c55e"][Math.floor(Math.random()*7)],
      rot: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 6,
      vy: Math.random() * 3 + 2,
      vx: (Math.random() - 0.5) * 2,
    }));
    let frame;
    let done = false;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        p.y += p.vy; p.x += p.vx; p.rot += p.rotSpeed;
        ctx.save();
        ctx.translate(p.x + p.w/2, p.y + p.h/2);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      });
      if (!done && pieces.every(p => p.y > canvas.height)) { done = true; onDone(); return; }
      frame = requestAnimationFrame(draw);
    }
    draw();
    const t = setTimeout(() => { done = true; onDone(); }, 4000);
    return () => { cancelAnimationFrame(frame); clearTimeout(t); };
  }, []);
  return <canvas ref={canvasRef} style={{ position: "fixed", inset: 0, zIndex: 9999, pointerEvents: "none" }} />;
}

        {results.length > 0 && (
          <div style={{ maxHeight: 400, overflow: "auto" }}>
            {results.map(t => {
              const lq = q.toLowerCase();
              const matchedSub = t.subtasks.find(s => s.title.toLowerCase().includes(lq));
              return (
                <div key={t.id} onClick={() => { onSelect(t); onClose(); }}
                  style={{ padding: "12px 16px", borderBottom: `1px solid ${COLORS.border}`, cursor: "pointer", transition: "background 0.1s" }}
                  onMouseEnter={e => e.currentTarget.style.background = COLORS.surface2}
                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                    <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 6px", borderRadius: 4, background: PRIORITY_CONFIG[t.priority].dim, color: PRIORITY_CONFIG[t.priority].color }}>{t.priority.toUpperCase()}</span>
                    <span style={{ fontSize: 10, color: COLORS.textMuted, background: COLORS.surface3, borderRadius: 4, padding: "2px 6px" }}>{t.status}</span>
                    {t.isFrog && <span style={{ fontSize: 10 }}>🐸</span>}
                  </div>
                  <div style={{ fontWeight: 600, fontSize: 14, color: COLORS.text }}>{t.title}</div>
                  {t.description && <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 2 }}>{t.description.slice(0, 80)}{t.description.length > 80 ? "…" : ""}</div>}
                  {matchedSub && <div style={{ fontSize: 11, color: COLORS.accent, marginTop: 4 }}>↳ subtask: {matchedSub.title}</div>}
                </div>
              );
            })}
          </div>
        )}
        {q.trim().length >= 2 && results.length === 0 && (
          <div style={{ padding: 24, textAlign: "center", color: COLORS.textMuted, fontSize: 14 }}>No tasks found for "{q}"</div>
        )}
        {q.trim().length < 2 && (
          <div style={{ padding: "16px", color: COLORS.textMuted, fontSize: 13, textAlign: "center" }}>Type at least 2 characters to search</div>
        )}
      </div>
    </div>
  );
}

// ── Calendar View ──────────────────────────────────────────────────────────────
function CalendarView({ tasks, onEdit }) {
  const [weekOffset, setWeekOffset] = useState(0);

  const weekStart = (() => {
    const d = new Date();
    d.setDate(d.getDate() - d.getDay() + 1 + weekOffset * 7);
    d.setHours(0,0,0,0);
    return d;
  })();

  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    return d;
  });

  const todayStr = today();

  function dateStr(d) { return d.toISOString().split("T")[0]; }

  const unscheduled = tasks.filter(t => !t.due && t.status !== "Done");

  return (
    <div style={{ paddingBottom: 40 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
        <h2 style={{ fontSize: 20, fontWeight: 700 }}>Calendar</h2>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <button onClick={() => setWeekOffset(0)} style={{ background: COLORS.accentDim, color: COLORS.accent, borderRadius: 7, padding: "5px 12px", fontSize: 12, fontWeight: 600, border: `1px solid ${COLORS.accent}30` }}>Today</button>
          <button onClick={() => setWeekOffset(w => w-1)} style={{ background: COLORS.surface3, color: COLORS.text, borderRadius: 7, padding: "5px 10px", fontSize: 13, border: `1px solid ${COLORS.border}` }}>←</button>
          <span style={{ fontSize: 13, fontWeight: 600, color: COLORS.text, minWidth: 160, textAlign: "center" }}>
            {weekStart.toLocaleDateString("en-GB", { day: "numeric", month: "short" })} – {days[6].toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" })}
          </span>
          <button onClick={() => setWeekOffset(w => w+1)} style={{ background: COLORS.surface3, color: COLORS.text, borderRadius: 7, padding: "5px 10px", fontSize: 13, border: `1px solid ${COLORS.border}` }}>→</button>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 8, marginBottom: 24 }}>
        {days.map(day => {
          const ds = dateStr(day);
          const isToday = ds === todayStr;
          const dayTasks = tasks.filter(t => t.due === ds);
          return (
            <div key={ds} style={{ background: isToday ? COLORS.accentDim : COLORS.surface, border: `1px solid ${isToday ? COLORS.accent+"60" : COLORS.border}`, borderRadius: 10, padding: "10px 8px", minHeight: 120 }}>
              <div style={{ marginBottom: 8, textAlign: "center" }}>
                <div style={{ fontSize: 10, color: isToday ? COLORS.accent : COLORS.textMuted, fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase" }}>
                  {day.toLocaleDateString("en-GB", { weekday: "short" })}
                </div>
                <div style={{ fontSize: 18, fontWeight: 800, color: isToday ? COLORS.accent : COLORS.text, lineHeight: 1.2 }}>
                  {day.getDate()}
                </div>
              </div>
              {dayTasks.map(t => (
                <div key={t.id} onClick={() => onEdit(t)}
                  style={{ background: t.isFrog ? COLORS.frogDim : PRIORITY_CONFIG[t.priority].dim, border: `1px solid ${t.isFrog ? COLORS.frogBorder : PRIORITY_CONFIG[t.priority].color+"40"}`, borderRadius: 5, padding: "4px 6px", marginBottom: 4, cursor: "pointer", fontSize: 11, fontWeight: 600, color: t.isFrog ? COLORS.frogDark : PRIORITY_CONFIG[t.priority].color, lineHeight: 1.3 }}>
                  {t.isFrog ? "🐸 " : ""}{t.title.slice(0, 22)}{t.title.length > 22 ? "…" : ""}
                  {t.status === "Done" && <span style={{ marginLeft: 4, opacity: 0.7 }}>✓</span>}
                </div>
              ))}
              {dayTasks.length === 0 && (
                <div style={{ fontSize: 10, color: COLORS.border, textAlign: "center", marginTop: 8 }}>—</div>
              )}
            </div>
          );
        })}
      </div>

      {unscheduled.length > 0 && (
        <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 16 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 12 }}>
            Unscheduled ({unscheduled.length})
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {unscheduled.map(t => (
              <div key={t.id} onClick={() => onEdit(t)}
                style={{ background: PRIORITY_CONFIG[t.priority].dim, border: `1px solid ${PRIORITY_CONFIG[t.priority].color}40`, borderRadius: 7, padding: "5px 10px", cursor: "pointer", fontSize: 12, fontWeight: 600, color: PRIORITY_CONFIG[t.priority].color }}>

            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Focus Mode ─────────────────────────────────────────────────────────────────
function FocusMode({ task, onClose }) {
  const PRESETS = [
    { label: "Pomodoro", work: 25, brk: 5 },
    { label: "Deep Work", work: 50, brk: 10 },
    { label: "Quick", work: 15, brk: 3 },
    { label: "Custom", work: null, brk: null },
  ];

  const [showSettings, setShowSettings] = useState(false);
  const [preset, setPreset] = useState(0);
  const [workMins, setWorkMins] = useState(25);
  const [breakMins, setBreakMins] = useState(5);
  const [customWork, setCustomWork] = useState(25);
  const [customBreak, setCustomBreak] = useState(5);
  const [phase, setPhase] = useState("work");
  const [seconds, setSeconds] = useState(workMins * 60);
  const [running, setRunning] = useState(false);
  const [cycles, setCycles] = useState(0);
  const intervalRef = useRef(null);

  function applyPreset(idx) {
    const p = PRESETS[idx];
    setPreset(idx);
    if (p.work !== null) {
      setWorkMins(p.work);
      setBreakMins(p.brk);
      resetTimer(p.work, p.brk);
    }
  }

  function applyCustom() {
    const w = Math.max(1, Math.min(120, customWork));
    const b = Math.max(1, Math.min(60, customBreak));
    setWorkMins(w); setBreakMins(b);
    resetTimer(w, b);
    setShowSettings(false);
  }

  function resetTimer(w, b) {
    clearInterval(intervalRef.current);
    setRunning(false);
    setPhase("work");
    setSeconds((w || workMins) * 60);
    setCycles(0);
  }

  function reset() { resetTimer(workMins, breakMins); }
  function toggle() { setRunning(r => !r); }

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setSeconds(s => {
          if (s <= 1) {
            clearInterval(intervalRef.current);
            setRunning(false);
            if (phase === "work") {
              setCycles(c => c + 1);
              setPhase("break");
              setSeconds(breakMins * 60);
            } else {
              setPhase("work");
              setSeconds(workMins * 60);
            }
            return 0;
          }
          return s - 1;
        });
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [running, phase, workMins, breakMins]);

  const mins = String(Math.floor(seconds / 60)).padStart(2, "0");
  const secs = String(seconds % 60).padStart(2, "0");
  const totalSecs = phase === "work" ? workMins * 60 : breakMins * 60;
  const pct = totalSecs > 0 ? ((totalSecs - seconds) / totalSecs) * 100 : 0;
  const r = 80, circ = 2 * Math.PI * r;
  const isAtStart = seconds === totalSecs;

  return (
    <div style={{ position: "fixed", inset: 0, background: "#0f0f16", zIndex: 3000, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 20 }}>
      
      {/* Top bar */}
      <div style={{ position: "absolute", top: 20, left: 24, right: 24, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <button onClick={() => setShowSettings(s => !s)} style={{ background: "rgba(255,255,255,0.1)", color: "#fff", borderRadius: 8, padding: "8px 14px", fontSize: 13, fontWeight: 600 }}>
          ⚙ Settings
        </button>
        <button onClick={onClose} style={{ background: "rgba(255,255,255,0.1)", color: "#fff", borderRadius: 8, padding: "8px 16px", fontSize: 13, fontWeight: 600 }}>✕ Exit</button>
      </div>

      {/* Settings panel */}
      {showSettings && (
        <div style={{ position: "absolute", top: 64, left: 24, background: "#1a1a26", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 12, padding: 20, width: 280, zIndex: 10 }}>
          <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", fontWeight: 700, letterSpacing: 0.8, textTransform: "uppercase", marginBottom: 12 }}>Timer Presets</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
            {PRESETS.map((p, i) => (
              <button key={i} onClick={() => { applyPreset(i); if (p.work !== null) setShowSettings(false); }}
                style={{ background: preset === i ? COLORS.accent : "rgba(255,255,255,0.08)", color: "#fff", borderRadius: 7, padding: "6px 12px", fontSize: 12, fontWeight: 600, border: preset === i ? "none" : "1px solid rgba(255,255,255,0.1)" }}>
                {p.label}{p.work ? ` ${p.work}/${p.brk}` : ""}
              </button>
            ))}
          </div>

          {preset === 3 && (
            <div>
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", fontWeight: 700, letterSpacing: 0.8, textTransform: "uppercase", marginBottom: 10 }}>Custom Duration (minutes)</div>
              <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginBottom: 4 }}>Work</div>
                  <input type="number" min={1} max={120} value={customWork}
                    onChange={e => setCustomWork(Number(e.target.value))}
                    style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", color: "#fff", borderRadius: 7, padding: "8px 10px", fontSize: 14, width: "100%", textAlign: "center" }} />
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginBottom: 4 }}>Break</div>
                  <input type="number" min={1} max={60} value={customBreak}
                    onChange={e => setCustomBreak(Number(e.target.value))}
                    style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", color: "#fff", borderRadius: 7, padding: "8px 10px", fontSize: 14, width: "100%", textAlign: "center" }} />
                </div>
              </div>
              <button onClick={applyCustom} style={{ width: "100%", background: COLORS.accent, color: "#fff", borderRadius: 8, padding: "9px", fontSize: 13, fontWeight: 600 }}>Apply Custom Timer</button>
            </div>
          )}

          <div style={{ marginTop: 14, paddingTop: 14, borderTop: "1px solid rgba(255,255,255,0.08)", fontSize: 11, color: "rgba(255,255,255,0.3)", textAlign: "center" }}>
            Current: {workMins} min work / {breakMins} min break
          </div>
        </div>
      )}

      <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 12 }}>
        {phase === "work" ? "🎯 Focus Session" : "☕ Break Time"} · {cycles} cycle{cycles !== 1 ? "s" : ""} complete
      </div>

      <div style={{ fontSize: 20, fontWeight: 700, color: "#fff", marginBottom: 40, textAlign: "center", maxWidth: 500, lineHeight: 1.4 }}>
        {task.isFrog && <span style={{ marginRight: 8 }}>🐸</span>}{task.title}
      </div>

      <div style={{ position: "relative", marginBottom: 16 }}>
        <svg width={200} height={200} viewBox="0 0 200 200">
          <circle cx={100} cy={100} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={8} />
          <circle cx={100} cy={100} r={r} fill="none"
            stroke={phase === "work" ? COLORS.accent : COLORS.frog}
            strokeWidth={8} strokeLinecap="round"
            strokeDasharray={circ}
            strokeDashoffset={circ - (pct / 100) * circ}
            transform="rotate(-90 100 100)"
            style={{ transition: "stroke-dashoffset 1s linear" }} />
        </svg>
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <div style={{ fontSize: 42, fontWeight: 800, color: "#fff", fontFamily: "monospace", letterSpacing: -1 }}>{mins}:{secs}</div>
          <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", marginTop: 4 }}>{phase === "work" ? `${workMins} min work` : `${breakMins} min break`}</div>
        </div>
      </div>

      <div style={{ fontSize: 11, color: "rgba(255,255,255,0.25)", marginBottom: 28 }}>
        {PRESETS[preset].label} · {workMins}/{breakMins} min
      </div>

      <div style={{ display: "flex", gap: 12 }}>
        <button onClick={toggle} style={{ background: phase === "work" ? COLORS.accent : COLORS.frog, color: "#fff", borderRadius: 10, padding: "14px 36px", fontSize: 16, fontWeight: 700, minWidth: 140 }}>
          {running ? "⏸ Pause" : isAtStart ? "▶ Start" : "▶ Resume"}
        </button>
        <button onClick={reset} style={{ background: "rgba(255,255,255,0.1)", color: "#fff", borderRadius: 10, padding: "14px 20px", fontSize: 16 }}>↺</button>
      </div>

      {task.description && (
        <div style={{ marginTop: 40, maxWidth: 480, textAlign: "center", fontSize: 13, color: "rgba(255,255,255,0.4)", lineHeight: 1.6 }}>
          {task.description}
        </div>
      )}
    </div>
  );
}

// ── Smart Due Date Suggestion ──────────────────────────────────────────────────
async function suggestDueDate(title, description, priority) {
  const prompt = `A user is creating a task and wants a suggested due date. Today is ${today()}.

Task title: ${title}
Description: ${description || "None"}
Priority: ${priority}

Based on the complexity implied by the title and description, and the priority level, suggest a realistic due date.

Respond with ONLY a JSON object like this (no other text, no markdown):
{"date": "YYYY-MM-DD", "reason": "one short sentence explaining why"}

The date must be today or in the future. High priority = sooner. Consider realistic working time needed.`;

  const response = await fetch("/.netlify/functions/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt }),
  });
  const data = await response.json();
  const text = (data.text || "").trim();
  try {
    const clean = text.replace(/```json|```/g, "").trim();
    return JSON.parse(clean);
  } catch(e) {
    return null;
  }
}

// ── Time Tracker ───────────────────────────────────────────────────────────────
function TimeTracker({ task, onUpdate }) {
  const [running, setRunning] = useState(false);
  const [startedAt, setStartedAt] = useState(null);
  const [elapsed, setElapsed] = useState(task.timeSpent || 0); // seconds
  const intervalRef = useRef(null);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setElapsed(task.timeSpent + Math.floor((Date.now() - startedAt) / 1000));
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [running, startedAt]);

  function toggle() {
    if (running) {
      clearInterval(intervalRef.current);
      const newTotal = task.timeSpent + Math.floor((Date.now() - startedAt) / 1000);
      setElapsed(newTotal);
      onUpdate(task.id, newTotal);
      setRunning(false);
      setStartedAt(null);
    } else {
      setStartedAt(Date.now());
      setRunning(true);
    }
  }

  function reset() {
    clearInterval(intervalRef.current);
    setRunning(false);
    setStartedAt(null);
    setElapsed(0);
    onUpdate(task.id, 0);
  }

  function fmtTime(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}h ${String(m).padStart(2,"0")}m`;
    return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
  }

  const estimated = task.estimatedMins ? task.estimatedMins * 60 : null;
  const pct = estimated ? Math.min((elapsed / estimated) * 100, 100) : null;

  return (
    <div style={{ marginTop: 10, padding: "10px 12px", background: COLORS.surface2, borderRadius: 8, border: `1px solid ${COLORS.border}` }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{ fontSize: 11, color: COLORS.textMuted, fontWeight: 600, flex: 1 }}>⏱ TIME</span>
        <span style={{ fontSize: 15, fontWeight: 700, fontFamily: "monospace", color: running ? COLORS.accent : COLORS.text }}>
          {fmtTime(elapsed)}
        </span>
        {estimated && <span style={{ fontSize: 11, color: COLORS.textMuted }}>/ {fmtTime(estimated)}</span>}
        <button onClick={toggle} style={{ background: running ? COLORS.highDim : COLORS.accentDim, color: running ? COLORS.high : COLORS.accent, borderRadius: 6, padding: "4px 10px", fontSize: 11, fontWeight: 700, border: "none" }}>
          {running ? "⏹ Stop" : "▶ Start"}
        </button>
        {elapsed > 0 && !running && <button onClick={reset} style={{ background: "none", color: COLORS.textMuted, fontSize: 13 }}>↺</button>}
      </div>
      {pct !== null && (
        <div style={{ marginTop: 8, height: 3, background: COLORS.surface3, borderRadius: 2, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${pct}%`, background: pct >= 100 ? COLORS.high : COLORS.accent, borderRadius: 2, transition: "width 1s linear" }} />
        </div>
      )}
    </div>
  );
}

// ── AI Daily Plan Modal ────────────────────────────────────────────────────────
function AIDailyPlanModal({ tasks, checkins, onClose }) {
  const [state, setState] = useState("idle"); // idle | loading | done | error

  const todayCheckin = checkins.find(c => c.date === today());

  async function generatePlan() {
    setState("loading");
    const taskList = activeTasks.map((t, i) =>
      `${i+1}. "${t.title}" | Priority: ${t.priority} | Due: ${t.due || "no date"} | Status: ${t.status}${t.isFrog ? " | FROG TASK" : ""}${t.subtasks.length ? ` | ${t.subtasks.filter(s=>s.done).length}/${t.subtasks.length} subtasks done` : ""}`
    ).join("\n");

    const wellbeing = todayCheckin
      ? `Today's check-in — Mood: ${todayCheckin.mood}/5, Energy: ${todayCheckin.energy}/5, Stress: ${todayCheckin.stress}/5, Sleep: ${todayCheckin.sleep}/5`
      : "No check-in today yet";

    const prompt = `You are a productivity coach. A user wants a suggested order to tackle their tasks today.

${wellbeing}

Their active tasks:
${taskList || "No active tasks"}

Respond with ONLY this JSON format (no markdown, no extra text):

// ── Correlation Analysis ───────────────────────────────────────────────────────
function CorrelationAnalysis({ tasks, checkins }) {
  if (checkins.length < 5) {
    return (
      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 24, textAlign: "center" }}>
        <div style={{ fontSize: 24, marginBottom: 8 }}>📊</div>
        <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 6 }}>Not enough data yet</div>
        <div style={{ fontSize: 13, color: COLORS.textMuted, lineHeight: 1.6 }}>Complete at least 5 daily check-ins to unlock correlation insights. You have {checkins.length} so far.</div>
      </div>
    );
  }

  const metrics = ["mood", "energy", "sleep", "stress", "happiness"];
  const metricLabels = { mood: "Mood 😊", energy: "Energy ⚡", sleep: "Sleep 😴", stress: "Stress 😤", happiness: "Happiness 😄" };

  // For each checkin day, count tasks completed
  const enriched = checkins.map(c => {
    const completed = tasks.filter(t => t.completedAt && t.completedAt.startsWith(c.date)).length;
    return { ...c, completed };
  });

  // Simple correlation: for each metric, group days into low (1-2), mid (3), high (4-5) and average tasks completed
  function correlate(metric) {
    const low = enriched.filter(c => c[metric] <= 2);
    const mid = enriched.filter(c => c[metric] === 3);
    const high = enriched.filter(c => c[metric] >= 4);
    const avg = arr => arr.length ? (arr.reduce((a, c) => a + c.completed, 0) / arr.length).toFixed(1) : null;
    return { low: avg(low), mid: avg(mid), high: avg(high), lowN: low.length, highN: high.length };
  }

  function insight(metric, data) {
    if (!data.low || !data.high || data.lowN < 2 || data.highN < 2) return null;
    const diff = (parseFloat(data.high) - parseFloat(data.low)).toFixed(1);
    const isStress = metric === "stress";
    if (Math.abs(diff) < 0.3) return `${metricLabels[metric]} doesn't strongly affect your output.`;
    if (!isStress) {
      return diff > 0
        ? `Higher ${metric} days → ${diff} more tasks completed on average.`
        : `Higher ${metric} doesn't improve output — quality may matter more than quantity.`;
    } else {
      return diff > 0
        ? `Surprisingly, higher stress days see ${diff} more tasks — you may work well under pressure.`
        : `Lower stress days → ${Math.abs(diff)} more tasks — calmer days are more productive for you.`;
    }
  }

  const maxBar = Math.max(...enriched.map(c => c.completed), 1);

  return (
    <div style={{ paddingBottom: 20 }}>
      <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 16 }}>
        Wellbeing × Productivity Correlations
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        {metrics.map(metric => {
          const data = correlate(metric);
          const ins = insight(metric, data);
          const isStress = metric === "stress";
          return (
            <div key={metric} style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: 14 }}>
              <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 10 }}>{metricLabels[metric]}</div>
              <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                {[
                  { label: "Low (1-2)", val: data.low, n: data.lowN },
                  { label: "Mid (3)", val: data.mid, n: data.midN },
                  { label: "High (4-5)", val: data.high, n: data.highN },
                ].map(({ label, val, n }) => (
                  <div key={label} style={{ flex: 1, textAlign: "center" }}>
                    <div style={{ fontSize: 10, color: COLORS.textMuted, marginBottom: 4 }}>{label}</div>
                    <div style={{ fontSize: 18, fontWeight: 700, color: val ? COLORS.accent : COLORS.textMuted }}>{val || "—"}</div>
                    <div style={{ fontSize: 10, color: COLORS.textMuted }}>tasks avg</div>
                  </div>
                ))}
              </div>
              {ins && (
                <div style={{ fontSize: 12, color: COLORS.textDim, background: COLORS.surface2, borderRadius: 7, padding: "6px 10px", lineHeight: 1.5 }}>
                  💡 {ins}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}
